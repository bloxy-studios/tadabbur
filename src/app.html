<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%">
	<head>
		<meta charset="utf-8" />

		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#faf9f7" />
		<link rel="icon" href="/favicon-96.png" type="image/png" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Tadabbur" />
		<meta property="og:image" content="https://tadabbur.fahreziadh.workers.dev/og.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta name="twitter:card" content="summary_large_image" />
		<link
			rel="preload"
			href="/fonts/UthmanicHafsV22.woff2"
			as="font"
			type="font/woff2"
			crossorigin="anonymous"
		/>

		<meta name="text-scale" content="scale" />
		<script>
			// Apply theme + Arabic font/size before first paint to avoid a flash.
			// Painting the background inline matters: CSS variables only exist once
			// the stylesheet lands, and dark themes would flash white without it.
			try {
				var prefs = JSON.parse(localStorage.getItem('tadabbur:prefs') || '{}');
				// Themes are a flat list; 'system' and 'palette' are legacy prefs.
				var theme = prefs.palette && prefs.palette !== 'default' ? prefs.palette : prefs.theme;
				if (!theme || theme === 'system') {
					theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
				}
				var root = document.documentElement;
				root.setAttribute('data-theme', theme);
				var papers = {
					light: '#faf9f7',
					dark: '#171412',
					mushaf: '#f6efe0',
					rawdah: '#f3f6f1',
					sea: '#12151c',
					night: '#000000'
				};
				var dark = theme === 'dark' || theme === 'sea' || theme === 'night';
				if (dark) root.classList.add('dark');
				root.style.backgroundColor = papers[theme] || papers.light;
				root.style.colorScheme = dark ? 'dark' : 'light';
				document
					.querySelector('meta[name="theme-color"]')
					.setAttribute('content', papers[theme] || papers.light);
				var fonts = {
					uthmani: "'KFGQPC Uthmanic Hafs'",
					amiri: "'Amiri Quran'",
					scheherazade: "'Scheherazade New'",
					noto: "'Noto Naskh Arabic'"
				};
				if (fonts[prefs.arabicFont]) {
					root.style.setProperty('--arabic-font', fonts[prefs.arabicFont]);
				}
				if (typeof prefs.arabicSize === 'number') {
					root.style.setProperty('--arabic-size', prefs.arabicSize + 'rem');
				}
			} catch (e) {
				/* first visit, defaults apply */
			}
		</script>
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
